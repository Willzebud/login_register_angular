<div class="auth-page">
  <div class="auth-card">
    <div class="tabs">
      <button
        class="tab"
        type="button"
        [class.active]="isLoginActive()"
        (click)="changeView('Login')"
      >
        Login
      </button>

      <button
        class="tab"
        type="button"
        [class.active]="isRegisterActive()"
        (click)="changeView('Register')"
      >
        Sign Up
      </button>
    </div>

    <div class="form-body">
      @if (isLoginActive()) {
        <app-login></app-login>
      } @else {
        <app-register (registerSuccess)="changeView('Login')"></app-register>
      }
    </div>
  </div>
</div>
